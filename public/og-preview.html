<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @font-face {
    font-family: 'TikTok Sans';
    src: url('/fonts/TikTokSans-Variable.ttf') format('truetype-variations');
    font-weight: 100 900;
    font-display: block;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0d0e11; }
  .og {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0d0e11;
    font-family: 'TikTok Sans', system-ui, sans-serif;
    color: #f4f4f2;
  }
  /* lime diagonal wipe on the right — the site's signature motif */
  .wipe {
    position: absolute;
    inset: 0;
    background: #ccff00;
    clip-path: polygon(70% 0, 100% 0, 100% 100%, 46% 100%);
  }
  .phone {
    position: absolute;
    right: 96px;
    top: 50%;
    transform: translateY(-50%) rotate(-5deg);
    width: 300px;
    height: auto;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,.55));
  }
  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    padding: 74px 80px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .wordmark { height: 42px; width: 125px; fill: #ccff00; display: block; }
  .pill {
    margin-top: auto;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    align-self: flex-start;
    padding: 9px 16px;
    border: 1px solid rgba(204,255,0,.5);
    border-radius: 999px;
    color: #ccff00;
    font-weight: 600;
    font-stretch: 88%;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 14px;
  }
  .pill svg { width: 15px; height: 15px; fill: #ccff00; }
  h1 {
    margin-top: 20px;
    font-weight: 800;
    font-size: 92px;
    line-height: 0.96;
    letter-spacing: -0.02em;
    max-width: 720px;
  }
  h1 .lime { color: #ccff00; }
  p {
    margin-top: 22px;
    margin-bottom: auto;
    font-weight: 600;
    font-size: 27px;
    line-height: 1.35;
    color: #9a9ca6;
    max-width: 560px;
  }
</style>
</head>
